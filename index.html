<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Recover</title>

<style>

body{
margin:0;
padding:0;
background:#050816;
font-family:Arial;
color:white;
}

.container{
padding:30px;
max-width:700px;
margin:auto;
}

.card{
background:#111827;
padding:30px;
border-radius:20px;
box-shadow:0 0 25px cyan;
}

h1{
text-align:center;
font-size:50px;
color:cyan;
}

.tag{
text-align:center;
color:#cbd5e1;
margin-bottom:30px;
}

.service{
background:#1f2937;
padding:15px;
margin-top:15px;
border-radius:10px;
}

.price{
color:cyan;
font-weight:bold;
margin-top:5px;
}

input, textarea{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:10px;

background:#0f172a;

color:white;
}

button{

width:100%;

padding:15px;

margin-top:20px;

background:cyan;

border:none;

border-radius:10px;

font-size:18px;

font-weight:bold;

cursor:pointer;
}

.email{
text-align:center;
margin-top:20px;
}

.footer{
text-align:center;
margin-top:20px;
color:gray;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Shadow Recover</h1>

<div class="tag">
Secure Account Recovery Support
</div>

<div class="service">
Free Fire Recovery
<div class="price">Price: ₹199 - ₹999</div>
</div>

<div class="service">
Facebook Recovery
<div class="price">Price: ₹299 - ₹1499</div>
</div>

<div class="service">
Instagram Recovery
<div class="price">Price: ₹299 - ₹1999</div>
</div>

<div class="service">
Gmail Recovery
<div class="price">Price: ₹499 - ₹2499</div>
</div>

<h2>Submit Details</h2>

<input type="text" placeholder="Your Name">

<input type="text" placeholder="Game / Account UID">

<textarea rows="5" placeholder="Describe Your Problem"></textarea>

<button>
Submit Request
</button>

<div class="email">
Contact:
<br><br>
srcybershell@gmail.com

<div class="footer">

</div>

</div>

</html>
