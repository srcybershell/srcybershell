<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Recover</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top, #00ffff22, transparent 40%),
radial-gradient(circle at bottom, #00ffff11, transparent 40%);
z-index:-1;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.logo{
text-align:center;
font-size:65px;
font-weight:bold;
color:cyan;
text-shadow:0 0 20px cyan;
margin-top:40px;
}

.tag{
text-align:center;
color:#94a3b8;
margin-top:10px;
font-size:18px;
}

.box{
background:#0f172a;
padding:30px;
border-radius:20px;
margin-top:40px;
box-shadow:0 0 25px #00ffff44;
}

.section-title{
font-size:28px;
margin-bottom:20px;
color:cyan;
}

.service{
background:#111827;
padding:20px;
margin-top:15px;
border-radius:15px;
transition:0.3s;
}

.service:hover{
transform:scale(1.03);
box-shadow:0 0 15px cyan;
}

.price{
margin-top:10px;
color:cyan;
font-weight:bold;
}

input, textarea{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:12px;

background:#1e293b;

color:white;

font-size:16px;
}

button{

width:100%;

padding:15px;

margin-top:20px;

background:cyan;

border:none;

border-radius:12px;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:0.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 20px cyan;
}

.contact{
text-align:center;
margin-top:30px;
font-size:20px;
}

.footer{
text-align:center;
margin-top:30px;
color:gray;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
Shadow Recover
</div>

<div class="tag">
Secure Cyber Recovery Support
</div>

<div class="box">

<div class="section-title">
Services
</div>

<div class="service">
Free Fire Recovery
<div class="price">₹199 - ₹999</div>
</div>

<div class="service">
Facebook Recovery
<div class="price">₹299 - ₹1499</div>
</div>

<div class="service">
Instagram Recovery
<div class="price">₹299 - ₹1999</div>
</div>

<div class="service">
Gmail Recovery
<div class="price">₹499 - ₹2499</div>
</div>

</div>

<div class="box">

<div class="section-title">
Submit Recovery Request
</div>

<input type="text" placeholder="Your Name">

<input type="text" placeholder="UID / Username">

<textarea rows="5"
placeholder="Describe your issue"></textarea>

<button>
Submit Request
</button>

<div class="contact">

Contact Support:
<br><br>

srcybershell@gmail.com

</div>

</div>

<div class="footer">
Owner Verification Required
</div>

</div>

</body>
</html>
